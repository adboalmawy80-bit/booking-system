<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Booking Hub Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #0ea5e9;
            --bg-app: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        /* ألوان الـ Dark Mode */
        [data-theme="dark"] {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background-color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-app);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* هيدر الصفحة والـ Dark Mode Toggle */
        .top-bar {
            width: 100%;
            max-width: 1300px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-dark);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-container {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
        }

        .booking-card, .admin-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .booking-card {
            width: 40%;
        }

        .admin-card {
            width: 60%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .card-header h2 {
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .icon-primary, .icon-secondary { font-size: 2rem; }
        .icon-primary { color: var(--primary); }
        .icon-secondary { color: var(--secondary); }

        /* مدخلات الفورم */
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-group label i { margin-right: 5px; color: var(--primary); }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-dark);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-submit:hover { background: var(--primary-hover); }

        /* حماية الآدمن (شاشة القفل) */
        .admin-lock-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 30px;
            text-align: center;
        }

        .admin-lock-screen i { font-size: 3rem; color: var(--secondary); margin-bottom: 15px; }
        .admin-lock-screen h3 { color: var(--text-dark); margin-bottom: 10px; }
        .admin-lock-screen p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .admin-lock-screen input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
            text-align: center;
            background: var(--bg-app);
            color: var(--text-dark);
        }

        /* جدول الحجوزات */
        .table-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 480px;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        th {
            background-color: var(--bg-app);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            position: sticky; top: 0;
        }
        td { font-size: 0.9rem; color: var(--text-dark); }
        .customer-info .phone { font-size: 0.8rem; color: var(--text-muted); display: block; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-badge.Pending { background-color: #fef3c7; color: #d97706; }
        .status-badge.Approved { background-color: #dcfce7; color: #15803d; }

        .action-btns { display: flex; gap: 8px; }
        .btn-action {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .btn-approve { background-color: #dcfce7; color: #15803d; }
        .btn-delete { background-color: #fee2e2; color: #b91c1c; }

        .message-box { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 0.9rem; text-align: center; }
        .message-box.success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .message-box.error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .hidden { display: none !important; }

        @media (max-width: 1024px) {
            .app-container { flex-direction: column; }
            .booking-card, .admin-card { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="theme-toggle" id="themeToggleBtn">
            <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
        </button>
    </div>

    <div class="app-container">
        <div class="booking-card">
            <div class="card-header">
                <i class="fa-solid fa-calendar-plus icon-primary"></i>
                <h2>Book Appointment</h2>
                <p>Fill out the form to reserve your spot live.</p>
            </div>
            
            <form id="bookingForm">
                <div class="input-group">
                    <label for="name"><i class="fa-solid fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="input-group">
                    <label for="phone"><i class="fa-solid fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 234 567 890" required>
                </div>

                <div class="row">
                    <div class="input-group col">
                        <label for="date"><i class="fa-solid fa-calendar-days"></i> Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="input-group col">
                        <label for="time"><i class="fa-solid fa-clock"></i> Time Slot</label>
                        <select id="time" required>
                            <option value="" disabled selected>Choose Time</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="01:00 PM">01:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span id="btnText">Confirm Appointment</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
            <div id="messageBox" class="message-box hidden"></div>
        </div>

        <div class="admin-card">
            <div class="admin-lock-screen" id="adminLock">
                <i class="fa-solid fa-lock"></i>
                <h3>Admin Verification</h3>
                <p>Enter administrative password to view dashboard</p>
                <input type="password" id="adminPassInput" placeholder="Password: admin123">
                <button class="btn-submit" style="max-width: 200px;" onclick="verifyAdmin()">Unlock</button>
                <p id="lockError" style="color: #ef4444; margin-top: 10px;" class="hidden">Incorrect password!</p>
            </div>

            <div class="card-header">
                <i class="fa-solid fa-users-gear icon-secondary"></i>
                <h2>Admin Dashboard</h2>
                <p>Live view of all reservations.</p>
            </div>

            <div class="table-wrapper">
                <table id="appointmentsTable">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Date & Time</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // تفعيل وحفظ الثيم المظلم/المضيء
        const themeBtn = document.getElementById('themeToggleBtn');
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            themeBtn.querySelector('i').className = targetTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            themeBtn.querySelector('span').textContent = targetTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
        });

        // التحقق من كلمة مرور الآدمن (باسورد افتراضي: admin123)
        function verifyAdmin() {
            const pass = document.getElementById('adminPassInput').value;
            const errorText = document.getElementById('lockError');
            if (pass === 'admin123') {
                document.getElementById('adminLock').classList.add('hidden');
                loadAppointments();
            } else {
                errorText.classList.remove('hidden');
            }
        }

        // الكشف الذكي وتعطيل الأوقات المحجوزة
        const dateInput = document.getElementById('date');
        const timeSelect = document.getElementById('time');

        dateInput.addEventListener('change', async () => {
            const selectedDate = dateInput.value;
            if (!selectedDate) return;

            try {
                const response = await fetch(`/api/booked-slots?date=${selectedDate}`);
                const bookedSlots = await response.json();

                // إعادة تفعيل كافة الخيارات أولاً
                Array.from(timeSelect.options).forEach(option => {
                    option.disabled = false;
                    option.style.textDecoration = "none";
                });

                // تعطيل الأوقات المحجوزة بالفعل
                Array.from(timeSelect.options).forEach(option => {
                    if (bookedSlots.includes(option.value)) {
                        option.disabled = true;
                        option.style.textDecoration = "line-through"; // خط فوق الوقت المحجوز للتوضيح
                    }
                });
            } catch (err) {
                console.error("Error fetching slots:", err);
            }
        });

        // جلب البيانات من السيرفر وعرضها
        async function loadAppointments() {
            const tbody = document.getElementById('appointmentsList');
            try {
                const response = await fetch('/api/appointments');
                const appointments = await response.json();
                tbody.innerHTML = '';

                if (appointments.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #64748b;">No reservations found.</td></tr>`;
                    return;
                }

                appointments.forEach(app => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="customer-info">
                                <strong>${app.name}</strong>
                                <span class="phone">${app.phone}</span>
                            </div>
                        </td>
                        <td>
                            <div>${app.date}</div>
                            <div style="font-size: 0.8rem; color: #64748b;">${app.time}</div>
                        </td>
                        <td>
                            <span class="status-badge ${app.status}">${app.status}</span>
                        </td>
                        <td>
                            <div class="action-btns">
                                ${app.status === 'Pending' ? `
                                    <button class="btn-action btn-approve" onclick="updateStatus(${app.id}, 'Approved')">
                                        <i class="fa-solid fa-check"></i> Approve
                                    </button>
                                ` : ''}
                                <button class="btn-action btn-delete" onclick="deleteAppointment(${app.id})">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error loading appointments:', err);
            }
        }

        // حجز جديد
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            const messageBox = document.getElementById('messageBox');
            const btnText = document.getElementById('btnText');
            const originalText = btnText.textContent;

            btnText.textContent = "Processing...";
            messageBox.className = "message-box hidden";

            try {
                const response = await fetch('/api/appointments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, date, time })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message;
                    messageBox.className = "message-box success";
                    document.getElementById('bookingForm').reset();
                    if (document.getElementById('adminLock').classList.contains('hidden')) {
                        loadAppointments();
                    }
                } else {
                    messageBox.textContent = data.error || "Error occurred!";
                    messageBox.className = "message-box error";
                }
            } catch (err) {
                messageBox.textContent = "Connection error.";
                messageBox.className = "message-box error";
            } finally {
                btnText.textContent = originalText;
            }
        });

        // تغيير الحالة (قبول)
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/appointments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) {
                    loadAppointments();
                }
            } catch (err) {
                console.error('Error updating status:', err);
            }
        }

        // حذف حجز
        async function deleteAppointment(id) {
            if (!confirm('Are you sure you want to delete this appointment?')) return;
            try {
                const response = await fetch(`/api/appointments/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    loadAppointments();
                }
            } catch (err) {
                console.error('Error deleting appointment:', err);
            }
        }
    </script>
</body>
</html>
